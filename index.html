<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="hero">
    <div class="hero__glow hero__glow--one"></div>
    <div class="hero__glow hero__glow--two"></div>

    <section class="card">
      <p class="eyebrow">Single-Page Demo</p>
      <h1>Hello, World.</h1>
      <p class="subtitle">
        A clean, modern starter page built with only HTML, CSS, and JavaScript.
      </p>

      <div class="actions">
        <button class="primary-button" id="helloButton" type="button">
          Change greeting
        </button>
        <p class="message" id="message">Welcome to your new website.</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
